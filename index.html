<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Oracle — Your Fate Awaits</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="stars" id="stars"></div>
  <div class="fog"></div>

  <main class="container">

    <!-- LANDING -->
    <section id="landing" class="screen active">
      <div class="sigil">
        <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="60" cy="60" r="55" stroke="currentColor" stroke-width="0.5" opacity="0.4"/>
          <circle cx="60" cy="60" r="40" stroke="currentColor" stroke-width="0.5" opacity="0.6"/>
          <circle cx="60" cy="60" r="3" fill="currentColor" opacity="0.8"/>
          <line x1="60" y1="5" x2="60" y2="115" stroke="currentColor" stroke-width="0.4" opacity="0.3"/>
          <line x1="5" y1="60" x2="115" y2="60" stroke="currentColor" stroke-width="0.4" opacity="0.3"/>
          <line x1="18" y1="18" x2="102" y2="102" stroke="currentColor" stroke-width="0.4" opacity="0.3"/>
          <line x1="102" y1="18" x2="18" y2="102" stroke="currentColor" stroke-width="0.4" opacity="0.3"/>
          <polygon points="60,15 70,45 100,45 77,62 85,92 60,74 35,92 43,62 20,45 50,45" stroke="currentColor" stroke-width="0.6" fill="none" opacity="0.5"/>
        </svg>
      </div>
      <h1 class="title">The Oracle</h1>
      <p class="subtitle">The threads of your fate are already woven.<br/>Come see what lies ahead.</p>
      <button class="cta-btn" onclick="startQuiz()">Enter the Veil</button>
      <p class="warning">answer truthfully. the oracle sees all.</p>
    </section>

    <!-- QUIZ -->
    <section id="quiz" class="screen">
      <div class="progress-wrap">
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <span class="progress-label" id="progress-label">1 / 6</span>
      </div>

      <div class="question-wrap" id="question-wrap">
        <!-- injected by JS -->
      </div>

      <button class="next-btn" id="next-btn" onclick="nextQuestion()" disabled>
        <span id="next-label">Continue</span>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </section>

    <!-- LOADING -->
    <section id="loading" class="screen">
      <div class="eye-wrap">
        <div class="eye">
          <div class="pupil"></div>
        </div>
      </div>
      <p class="loading-line" id="loading-line">The oracle peers through the veil...</p>
    </section>

    <!-- PROPHECY -->
    <section id="prophecy" class="screen">
      <p class="prophecy-eyebrow">your prophecy</p>
      <div class="prophecy-divider"></div>
      <div class="prophecy-text" id="prophecy-text"></div>
      <div class="prophecy-divider" style="margin-top:2.5rem"></div>
      <button class="restart-btn" onclick="restart()">ask again</button>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
